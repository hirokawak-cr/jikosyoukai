<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>電卓</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .calculator {
      background: #16213e;
      border-radius: 24px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .display {
      background: #0f3460;
      border-radius: 16px;
      padding: 20px 24px 16px;
      margin-bottom: 20px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
    }

    .expression {
      font-size: 14px;
      color: #7fb3d3;
      min-height: 20px;
      word-break: break-all;
      text-align: right;
      margin-bottom: 6px;
    }

    .result {
      font-size: 42px;
      font-weight: 300;
      color: #e0e0e0;
      word-break: break-all;
      text-align: right;
      line-height: 1.1;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 400;
      height: 64px;
      cursor: pointer;
      transition: transform 0.08s, opacity 0.08s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(0.93);
      opacity: 0.8;
    }

    .btn-num {
      background: #1a1a4e;
      color: #e0e0e0;
    }

    .btn-op {
      background: #e94560;
      color: #fff;
    }

    .btn-func {
      background: #0f3460;
      color: #7fb3d3;
    }

    .btn-eq {
      background: #e94560;
      color: #fff;
      font-size: 24px;
    }

    .btn-zero {
      grid-column: span 2;
    }

    .btn-num:hover { background: #25257a; }
    .btn-op:hover  { background: #ff6b81; }
    .btn-func:hover { background: #1a4a80; }
    .btn-eq:hover  { background: #ff6b81; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-func" onclick="clearAll()">AC</button>
      <button class="btn-func" onclick="toggleSign()">+/-</button>
      <button class="btn-func" onclick="percent()">%</button>
      <button class="btn-op"   onclick="inputOp('/')">÷</button>

      <button class="btn-num" onclick="inputNum('7')">7</button>
      <button class="btn-num" onclick="inputNum('8')">8</button>
      <button class="btn-num" onclick="inputNum('9')">9</button>
      <button class="btn-op"  onclick="inputOp('*')">×</button>

      <button class="btn-num" onclick="inputNum('4')">4</button>
      <button class="btn-num" onclick="inputNum('5')">5</button>
      <button class="btn-num" onclick="inputNum('6')">6</button>
      <button class="btn-op"  onclick="inputOp('-')">−</button>

      <button class="btn-num" onclick="inputNum('1')">1</button>
      <button class="btn-num" onclick="inputNum('2')">2</button>
      <button class="btn-num" onclick="inputNum('3')">3</button>
      <button class="btn-op"  onclick="inputOp('+')">+</button>

      <button class="btn-num btn-zero" onclick="inputNum('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-eq"  onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let prev = null;
    let op = null;
    let justCalc = false;

    const displayResult = document.getElementById('result');
    const displayExpr   = document.getElementById('expression');

    function update() {
      displayResult.textContent = format(current);
    }

    function format(val) {
      const n = parseFloat(val);
      if (isNaN(n)) return val;
      if (Math.abs(n) >= 1e12) return n.toExponential(4);
      return val.replace(/^(-?\d+)(\.\d*)?$/, (_, int, dec) => {
        return int.replace(/\B(?=(\d{3})+(?!\d))/g, ',') + (dec || '');
      });
    }

    function inputNum(d) {
      if (justCalc) { current = d; justCalc = false; }
      else current = (current === '0' && d !== '.') ? d : current + d;
      if (current.length > 15) current = current.slice(0, 15);
      update();
    }

    function inputDot() {
      if (justCalc) { current = '0.'; justCalc = false; update(); return; }
      if (!current.includes('.')) current += '.';
      update();
    }

    function inputOp(o) {
      justCalc = false;
      if (prev !== null && op) {
        const r = compute(parseFloat(prev), parseFloat(current), op);
        displayExpr.textContent = `${format(prev)} ${opSymbol(op)} ${format(current)} ${opSymbol(o)}`;
        prev = String(r);
        current = String(r);
      } else {
        prev = current;
        displayExpr.textContent = `${format(current)} ${opSymbol(o)}`;
      }
      op = o;
    }

    function calculate() {
      if (prev === null || op === null) return;
      const a = parseFloat(prev), b = parseFloat(current);
      displayExpr.textContent = `${format(prev)} ${opSymbol(op)} ${format(current)} =`;
      const r = compute(a, b, op);
      current = String(r);
      prev = null; op = null; justCalc = true;
      update();
    }

    function compute(a, b, o) {
      if (o === '+') return round(a + b);
      if (o === '-') return round(a - b);
      if (o === '*') return round(a * b);
      if (o === '/') return b === 0 ? 'エラー' : round(a / b);
    }

    function round(n) {
      if (typeof n !== 'number') return n;
      return parseFloat(n.toPrecision(12));
    }

    function opSymbol(o) {
      return {'+':'+', '-':'−', '*':'×', '/':'÷'}[o] || o;
    }

    function clearAll() {
      current = '0'; prev = null; op = null; justCalc = false;
      displayExpr.textContent = '';
      update();
    }

    function toggleSign() {
      if (current === '0' || current === 'エラー') return;
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
      update();
    }

    function percent() {
      const n = parseFloat(current);
      if (isNaN(n)) return;
      current = String(round(n / 100));
      update();
    }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') inputOp('+');
      else if (e.key === '-') inputOp('-');
      else if (e.key === '*') inputOp('*');
      else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        update();
      }
    });
  </script>
</body>
</html>

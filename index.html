html<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>廣川生成 - 自己紹介</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .hero {
      text-align: center;
      padding: 2.5rem 1rem 2rem;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #e6f1fb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 500;
      color: #185fa5;
      margin: 0 auto 1.25rem;
      border: 1px solid #ddd;
    }

    .name {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
    }

    .section {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 12px;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .info-item {
      background: #f5f5f3;
      border-radius: 8px;
      padding: 12px;
    }

    .info-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .hobbies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hobby-tag {
      background: #f5f5f3;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 14px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .comment-box {
      background: #f5f5f3;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 15px;
      color: #1a1a1a;
      line-height: 1.7;
      border-left: 3px solid #ccc;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="avatar">廣</div>
      <div class="name">廣川 生成</div>
      <p class="tagline">自己紹介ページへようこそ</p>
    </div>

    <div class="section">
      <div class="section-title">基本情報</div>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">氏名</div>
          <div class="info-value">廣川 生成</div>
        </div>
        <div class="info-item">
          <div class="info-label">年齢</div>
          <div class="info-value">33歳</div>
        </div>
        <div class="info-item">
          <div class="info-label">生年月日</div>
          <div class="info-value">1993年2月22日</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">趣味</div>
      <div class="hobbies">
        <div class="hobby-tag">🏍 バイク</div>
        <div class="hobby-tag">🎮 ゲーム</div>
        <div class="hobby-tag">🎬 映画鑑賞</div>
        <div class="hobby-tag">▶ YouTube鑑賞</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">一言</div>
      <div class="comment-box">テストです。よろしくお願いします。</div>
    </div>
  </div>
</body>
